<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grafo Papers ↔ Autores (comunidades + relaciones)</title>
  <style>
    :root{
      --bg:#0f1115;--panel:#171a21;--text:#e7e7e7;--muted:#a7aab2;
      --edge-authored:#b7bfcc;--edge-coauthor:#d3d6dd;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Segoe UI,Roboto,Arial}
    .app{display:grid;grid-template-columns:320px 1fr;grid-template-rows:auto 1fr;grid-template-areas:"head head" "side main";gap:12px;padding:12px;box-sizing:border-box;height:100vh}
    header{grid-area:head;background:var(--panel);border:1px solid #232734;border-radius:14px;padding:10px 12px;display:flex;gap:10px;align-items:center}
    header h1{font-size:16px;margin:0;font-weight:600}
    .sp{flex:1}
    .btn,label.file{background:#1e2230;border:1px solid #2a3042;border-radius:10px;padding:8px 10px;font-size:13px;color:var(--text);cursor:pointer}
    .btn:hover,label.file:hover{border-color:#3a415a}
    input[type=file]{display:none}
    .side{grid-area:side;background:var(--panel);border:1px solid #232734;border-radius:14px;padding:12px;overflow:auto}
    .side h3{margin:0 0 8px;font-size:14px;color:var(--muted)}
    .kv{font-size:12px;color:var(--muted)}
    .legend{display:grid;gap:6px;margin-top:10px}
    .legend-item{display:flex;gap:8px;align-items:center;background:#1a1e29;border:1px solid #222636;border-radius:10px;padding:8px;font-size:12px}
    .sw{width:14px;height:14px;border-radius:4px;border:1px solid #0008}
    .filters{margin-top:12px;background:#1a1e29;border:1px solid #222636;border-radius:10px;padding:10px}
    .filters label{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted)}
    .main{grid-area:main;background:var(--panel);border:1px solid #232734;border-radius:14px;position:relative;overflow:hidden}
    svg{width:100%;height:100%;display:block;background: radial-gradient(1200px 800px at 40% 30%, #141825 0%, #0f1115 55%);}
    .link{stroke-opacity:.75}
    .link.authored{stroke:var(--edge-authored)}
    .link.coauthor{stroke:var(--edge-coauthor);stroke-dasharray:4 3}
    .node{cursor:pointer}
    .node.author circle{stroke:#0006}
    .node.paper circle{stroke:#0009}
    .node-label{pointer-events:none;font-size:10px;fill:#d8d8d8;text-shadow:0 1px 2px #000}
    .tooltip{position:absolute;background:#0e1118;border:1px solid #2b3147;border-radius:10px;padding:8px 10px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .15s ease;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 6px 20px #0007}
    .tooltip b{color:#fff}
    .muted{color:var(--muted)}
    .footer{position:absolute;right:10px;bottom:10px;background:#0f1320;border:1px solid #232742;border-radius:10px;padding:6px 8px;font-size:11px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Grafo Papers ↔ Autores</h1>
      <div class="sp"></div>
      <label class="file" for="fileInput">Cargar JSON</label>
      <input id="fileInput" type="file" accept=".json,application/json" />
      <button class="btn" id="fit">Autoajustar</button>
      <button class="btn" id="reset">Reset zoom</button>
    </header>

    <aside class="side">
      <h3>Resumen</h3>
      <div class="kv"><b id="stats-nodes">0</b> nodos · <b id="stats-links">0</b> aristas</div>
      <div class="kv" style="margin-top:4px;">Tipos de arista: <span class="muted">authored, coauthor</span></div>

      <div class="filters">
        <label><input type="checkbox" id="toggleAuthored" checked> mostrar <b>authored</b></label>
        <label><input type="checkbox" id="toggleCoauthor" checked> mostrar <b>coauthor</b></label>
      </div>

      <h3 style="margin-top:12px;">Comunidades</h3>
      <div class="legend" id="legend"></div>
    </aside>

    <main class="main">
      <svg id="scene" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="2.2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <g id="root"></g>
      </svg>
      <div class="tooltip" id="tooltip"></div>
      <div class="footer" id="footerInfo">Listo</div>
    </main>
  </div>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const svg = d3.select("#scene");
    const rootG = d3.select("#root");
    const tooltip = d3.select("#tooltip");
    const linkLayer = rootG.append("g").attr("class", "links");
    const nodeLayer = rootG.append("g").attr("class", "nodes");
    const labelLayer = rootG.append("g").attr("class", "labels");

    const zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", (ev)=> rootG.attr("transform", ev.transform));
    svg.call(zoom);

    let sim, nodes=[], links=[];
    let rendered = { linkSel:null, nodeSel:null, labelSel:null };

    // UI refs
    const statsNodes = document.getElementById("stats-nodes");
    const statsLinks = document.getElementById("stats-links");
    const legendEl = document.getElementById("legend");
    const footer = document.getElementById("footerInfo");
    const toggleAuthored = document.getElementById("toggleAuthored");
    const toggleCoauthor = document.getElementById("toggleCoauthor");

    document.getElementById("fileInput").addEventListener("change", onPickFile);
    document.getElementById("fit").onclick = fitView;
    document.getElementById("reset").onclick = ()=> svg.transition().duration(350).call(zoom.transform, d3.zoomIdentity);
    toggleAuthored.addEventListener("change", updateVisibility);
    toggleCoauthor.addEventListener("change", updateVisibility);

    function toast(msg){ footer.textContent = msg; setTimeout(()=> footer.textContent="Listo", 2500); }

    async function onPickFile(ev){
      const file = ev.target.files?.[0]; if(!file) return;
      const text = await file.text();
      let data = JSON.parse(text);
      // Aceptar 'links' o 'edges'
      if(!data.links && data.edges) data.links = data.edges;
      loadGraph(data);
    }

    function loadGraph(data){
      nodes = (data.nodes || []).map((d,i)=> ({...d, index:i}));
      links = (data.links || []).map(d=> ({...d}));
      // Fallback de color por comunidad si no viene 'color'
      for(const n of nodes){
        if(!n.color){
          const cid = (n.community ?? 0);
          n.color = colorForCommunity(cid);
        }
      }
      draw();
      buildLegend(nodes);
      statsNodes.textContent = nodes.length;
      statsLinks.textContent = links.length;
      toast("Grafo cargado");
    }

    function draw(){
      // Fuerzas
      sim?.stop();
      sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d=> d.id).distance(linkDistance).strength(linkStrength))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(600, 400))
        .force("collide", d3.forceCollide().radius(d=> nodeRadius(d)+2));

      // Links
      rendered.linkSel = linkLayer.selectAll("line").data(links, d=> d.source?.id+"→"+d.target?.id+"|"+(d.edge_type||""));
      rendered.linkSel.exit().remove();
      const linkEnter = rendered.linkSel.enter().append("line")
        .attr("class", d=> "link "+(d.edge_type||""))
        .attr("stroke-width", d=> d.edge_type==="coauthor" ? Math.max(1,(+d.weight||1)) : 1.5);
      rendered.linkSel = linkEnter.merge(rendered.linkSel);

      // Nodes
      rendered.nodeSel = nodeLayer.selectAll("g.node").data(nodes, d=> d.id);
      rendered.nodeSel.exit().remove();
      const nodeEnter = rendered.nodeSel.enter().append("g").attr("class", d=> "node "+(d.node_type||""));
      nodeEnter.append("circle")
        .attr("r", d=> nodeRadius(d))
        .attr("fill", d=> d.color || "#7aa0ff")
        .attr("filter","url(#glow)");
      nodeEnter.call(d3.drag()
        .on("start", (ev,d)=>{ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag",  (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
        .on("end",   (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); /* deja fijo hasta doble clic */ }));
      nodeEnter.on("dblclick", (ev,d)=> { d.fx=null; d.fy=null; });
      nodeEnter.on("mouseover", (ev,d)=> showTip(ev,d));
      nodeEnter.on("mousemove", (ev)=> moveTip(ev));
      nodeEnter.on("mouseout",  ()=> hideTip());
      rendered.nodeSel = nodeEnter.merge(rendered.nodeSel);

      // Labels
      rendered.labelSel = labelLayer.selectAll("text").data(nodes, d=> d.id);
      rendered.labelSel.exit().remove();
      const labelEnter = rendered.labelSel.enter().append("text").attr("class","node-label")
        .text(d=> labelText(d))
        .attr("text-anchor","middle")
        .attr("dy", d=> d.node_type==="paper" ? - (nodeRadius(d)+6) : (nodeRadius(d)+12));
      rendered.labelSel = labelEnter.merge(rendered.labelSel);

      sim.on("tick", ()=>{
        rendered.linkSel
          .attr("x1", d=>d.source.x).attr("y1", d=>d.source.y)
          .attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
        rendered.nodeSel.attr("transform", d=> `translate(${d.x},${d.y})`);
        rendered.labelSel.attr("x", d=> d.x).attr("y", d=> d.node_type==="paper" ? d.y- (nodeRadius(d)+6) : d.y + (nodeRadius(d)+12));
      });

      updateVisibility();
      setTimeout(fitView, 300);
    }

    function labelText(d){
      // Muestra nombre corto: para papers usa title, para autores label
      if(d.node_type==="paper"){
        return (d.label || d.title || "").slice(0,50);
      }
      return (d.label || d.name || "").slice(0,40);
    }

    function nodeRadius(d){
      // Papers un poco más grandes
      return d.node_type==="paper" ? 10 : 7;
    }

    function linkDistance(d){
      // authored más corto, coauthor más largo
      return d.edge_type==="coauthor" ? 80 : 40;
    }

    function linkStrength(d){
      if(d.edge_type==="coauthor"){
        return Math.min(1, 0.1 + (+(d.weight||1))*0.05);
      }
      return 0.6;
    }

    function showTip(ev,d){
      const t = d.node_type==="paper"
        ? `<b>Paper</b><br>${escapeHtml(d.title||d.label||"")}${d.year?` · <span class="muted">${d.year}</span>`:""}${d.venue?`<br><span class="muted">${escapeHtml(d.venue)}</span>`:""}${d.url?`<br><span class="muted">${escapeHtml(d.url)}</span>`:""}`
        : `<b>Autor</b><br>${escapeHtml(d.label||d.name||"")}${d.community_label?`<br><span class="muted">Comunidad: ${escapeHtml(d.community_label)}</span>`:""}`;
      tooltip.html(t).style("opacity", 1);
      moveTip(ev);
    }
    function moveTip(ev){ tooltip.style("left", (ev.pageX+12)+"px").style("top", (ev.pageY+12)+"px"); }
    function hideTip(){ tooltip.style("opacity", 0); }

    function updateVisibility(){
      const showAuthored = toggleAuthored.checked;
      const showCoauthor = toggleCoauthor.checked;
      rendered.linkSel.classed("hidden", d=> (d.edge_type==="authored" && !showAuthored) || (d.edge_type==="coauthor" && !showCoauthor));
      rendered.linkSel.attr("display", d=> (d.edge_type==="authored" && !showAuthored) || (d.edge_type==="coauthor" && !showCoauthor) ? "none" : null);
    }

    function fitView(){
      const bounds = rootG.node().getBBox();
      const fullW = +svg.attr("viewBox").split(" ")[2];
      const fullH = +svg.attr("viewBox").split(" ")[3];
      if(!bounds.width || !bounds.height){
        svg.transition().duration(350).call(zoom.transform, d3.zoomIdentity);
        return;
      }
      const midX = bounds.x + bounds.width / 2;
      const midY = bounds.y + bounds.height / 2;
      const scale = 0.85 / Math.max(bounds.width / fullW, bounds.height / fullH);
      const transform = d3.zoomIdentity.translate(fullW/2, fullH/2).scale(scale).translate(-midX, -midY);
      svg.transition().duration(500).call(zoom.transform, transform);
    }

    // --------- Leyenda ---------
    function buildLegend(nodes){
      legendEl.innerHTML = "";
      const items = Array.from(d3.rollup(nodes, v => v[0], d => d.community_label || (d.community??"unknown"), d=> d.color ? d.color : colorForCommunity(d.community??0)))
        .map(([label, n]) => ({ label, color: n.color || colorForCommunity(n.community??0) }))
        .sort((a,b)=> (a.label||"").localeCompare(b.label||""));
      for(const it of items){
        const row = document.createElement("div");
        row.className = "legend-item";
        row.innerHTML = `<span class="sw" style="background:${it.color}"></span><span>${escapeHtml(it.label||"unknown")}</span>`;
        legendEl.appendChild(row);
      }
    }

    // --------- Colores ---------
    const palette = ["#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd",
                     "#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf",
                     "#393b79","#637939","#8c6d31","#843c39","#7b4173",
                     "#5254a3","#8ca252","#bd9e39","#ad494a","#a55194"];
    function colorForCommunity(cid){
      cid = +cid || 0;
      return cid >= 0 ? palette[cid % palette.length] : "#999999";
    }

    // --------- Util ---------
    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
    }
  </script>
</body>
</html>
