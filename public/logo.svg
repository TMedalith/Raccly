<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients para un look más moderno -->
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e5e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lado izquierdo: Cerebro 3D estilizado (SYS en forma isométrica) -->
  <g transform="translate(80, 120)">
    <!-- Letra S superior -->
    <path d="M 0,0 L 30,15 L 30,45 L 0,30 Z" fill="#ffffff" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 30,15 L 60,0 L 60,30 L 30,45 Z" fill="#e8e8e8" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 0,30 L 30,45 L 60,30 L 30,15 Z" fill="#f5f5f5" stroke="#d1d1d1" stroke-width="2"/>
    
    <!-- Letra Y media -->
    <path d="M 0,40 L 30,55 L 30,85 L 0,70 Z" fill="#ffffff" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 30,55 L 60,40 L 60,70 L 30,85 Z" fill="#e8e8e8" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 0,70 L 30,85 L 60,70 L 30,55 Z" fill="#f5f5f5" stroke="#d1d1d1" stroke-width="2"/>
    
    <!-- Letra S inferior -->
    <path d="M 0,80 L 30,95 L 30,125 L 0,110 Z" fill="#ffffff" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 30,95 L 60,80 L 60,110 L 30,125 Z" fill="#e8e8e8" stroke="#d1d1d1" stroke-width="2"/>
    <path d="M 0,110 L 30,125 L 60,110 L 30,95 Z" fill="#f5f5f5" stroke="#d1d1d1" stroke-width="2"/>
  </g>

  <!-- Línea divisoria central -->
  <line x1="200" y1="100" x2="200" y2="300" stroke="#666" stroke-width="2" opacity="0.3"/>

  <!-- Lado derecho: Circuitos tecnológicos -->
  <g transform="translate(220, 120)">
    <!-- Nodo y circuito superior (rojo) -->
    <circle cx="80" cy="0" r="8" fill="#ef4444" stroke="#ff6b6b" stroke-width="2"/>
    <path d="M 0,0 Q 40,-10 80,0" stroke="#ef4444" stroke-width="3" fill="none"/>
    
    <!-- Nodo y circuito medio-alto (blanco) -->
    <circle cx="80" cy="40" r="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="2"/>
    <path d="M 0,40 L 80,40" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- Nodo y circuito medio (rojo ondulado) -->
    <circle cx="80" cy="80" r="8" fill="#ef4444" stroke="#ff6b6b" stroke-width="2"/>
    <path d="M 0,80 Q 20,70 40,80 Q 60,90 80,80" stroke="#ef4444" stroke-width="3" fill="none"/>
    
    <!-- Nodo y circuito medio-bajo (rojo) -->
    <circle cx="80" cy="120" r="8" fill="#ef4444" stroke="#ff6b6b" stroke-width="2"/>
    <path d="M 0,120 Q 40,130 80,120" stroke="#ef4444" stroke-width="3" fill="none"/>
    
    <!-- Nodo y circuito inferior (blanco) -->
    <circle cx="80" cy="160" r="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="2"/>
    <path d="M 0,160 Q 40,150 80,160" stroke="#ffffff" stroke-width="3" fill="none"/>
    
    <!-- Conexiones desde el centro -->
    <line x1="-20" y1="0" x2="0" y2="0" stroke="#ef4444" stroke-width="2"/>
    <line x1="-20" y1="40" x2="0" y2="40" stroke="#ffffff" stroke-width="2"/>
    <line x1="-20" y1="80" x2="0" y2="80" stroke="#ef4444" stroke-width="2"/>
    <line x1="-20" y1="120" x2="0" y2="120" stroke="#ef4444" stroke-width="2"/>
    <line x1="-20" y1="160" x2="0" y2="160" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
